<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — Games</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/foundation.css" />
  <link rel="stylesheet" href="../shared/navbar.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="../shared/access.js"></script>
  <script src="../shared/theme.js"></script>
  <script src="../shared/foundation.js"></script>
</head>
<body>
  <div id="navbarContainer"></div>

  <main class="games-page page-frame page-stack">
    <header class="games-head surface-panel">
      <p class="section-label">Phase 4</p>
      <h1>Game Hub</h1>
      <p>Browse and launch games from one clean catalog.</p>
    </header>

    <section class="surface-panel tools-row">
      <input id="gameSearchInput" type="search" placeholder="Search games by title or category" />
      <button id="clearSearchBtn" class="control-pill" type="button" hidden>Clear</button>
      <span id="gameStatus">Loading…</span>
    </section>

    <div id="gameSections" class="section-stack"></div>
    <p id="resultsMeta" class="results-meta" hidden></p>
    <div id="gameEmpty" class="surface-panel empty" hidden>No games matched your search.</div>
  </main>

  <script src="../shared/navbar.js" defer></script>
  <script src="./script.js" defer></script>
</body>
</html>
