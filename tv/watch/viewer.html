<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm 💜 - Tv Viewer</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />

  <link rel="manifest" href="../../manifest.json" />
  <link rel="apple-touch-icon" href="../../icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/theme.css" />
  <link rel="stylesheet" href="./viewer.css" />

  <script src="../../shared/access.js"></script>
  <script src="../../shared/theme.js"></script>
</head>
<body>

<div id="navbarContainer"></div>
<script src="../../shared/navbar.js"></script>


<main>
  <div id="playerWrapper">
    <div id="playerWithControls">
      <div id="mediaHeader" aria-live="polite">
        <div id="mediaTitle">Loading title…</div>
        <div id="mediaMeta">Loading date…</div>
        <div id="playerStatus" class="player-status" role="status" aria-live="polite"></div>
        <div id="playerTrustNote" class="player-trust-note">Using third-party providers. If one fails, switch servers or tap refresh.</div>
      </div>
      <div id="playerContainer">
        <iframe
          id="videoPlayer"
          src=""
          allowfullscreen
          allow="fullscreen; encrypted-media"
          playsinline
          scrolling="no"
          referrerpolicy="no-referrer"
        ></iframe>
        <div id="clickShield"></div>
      </div>

      <div id="playexBar">
        <div class="playback-note">
          <div class="playback-note-time" role="group" aria-label="Time">
            <input id="playbackNoteHours" type="text" inputmode="numeric" placeholder="00" aria-label="Hours" />
            <span class="time-separator" aria-hidden="true">:</span>
            <input id="playbackNoteMinutes" type="text" inputmode="numeric" placeholder="00" aria-label="Minutes" />
          </div>
        </div>
        <button id="languageBtn" title="Select Sub or Dub" aria-haspopup="true" aria-expanded="false" aria-controls="languageDropdown" aria-label="Select sub or dub">
          SUB/DUB
          <div id="languageDropdown" role="menu" aria-label="Audio selection">
            <div class="serverDropdownItem active" data-language="sub" role="menuitem" tabindex="0">Sub</div>
            <div class="serverDropdownItem" data-language="dub" role="menuitem" tabindex="0">Dub</div>
          </div>
        </button>
        <button id="subtitleBtn" title="Subtitles" aria-haspopup="true" aria-expanded="false" aria-controls="subtitleDropdown" aria-label="Subtitle options">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 3z"></path>
            <path d="M8 10h.01"></path>
            <path d="M12 10h4"></path>
            <path d="M8 14h.01"></path>
            <path d="M12 14h4"></path>
          </svg>
          <div id="subtitleDropdown" role="menu" aria-label="Subtitle selection">
            <div class="serverDropdownItem active" data-subtitle="off" role="menuitem" tabindex="0">Off</div>
            <div class="serverDropdownItem" data-subtitle="en" role="menuitem" tabindex="0">English</div>
            <div class="serverDropdownItem" data-subtitle="es" role="menuitem" tabindex="0">Spanish</div>
            <div class="serverDropdownItem" data-subtitle="fr" role="menuitem" tabindex="0">French</div>
          </div>
        </button>
        <button id="serverBtn" title="Select Server" aria-haspopup="true" aria-expanded="false" aria-controls="serverDropdown" aria-label="Select server">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="7" rx="2" ry="2"></rect>
            <rect x="2" y="13" width="20" height="7" rx="2" ry="2"></rect>
            <line x1="6" y1="8" x2="6" y2="8"></line>
            <line x1="6" y1="17" x2="6" y2="17"></line>
          </svg>
          <div id="serverDropdown" role="menu" aria-label="Server selection">
            <div class="serverDropdownItem active" data-server="embedmaster" role="menuitem" tabindex="0">EmbedMaster</div>
            <div class="serverDropdownItem" data-server="multiembed" role="menuitem" tabindex="0">MultiEmbed</div>
            <div class="serverDropdownItem" data-server="vidking" role="menuitem" tabindex="0">VidKing</div>
            <div class="serverDropdownItem" data-server="vidsrc" role="menuitem" tabindex="0">VidSrc</div>
            <div class="serverDropdownItem" data-server="vidnest" role="menuitem" tabindex="0">VidNest</div>
          </div>
        </button>
        <button id="refreshBtn" title="Refresh Current Server" aria-label="Refresh current server">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <polyline points="21 3 21 9 15 9"></polyline>
          </svg>
        </button>
        <button id="fullscreenBtn" title="Fullscreen">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M4 4h6M4 4v6M20 20h-6M20 20v-6M4 20l6-6M20 4l-6 6" />
          </svg>
        </button>
      </div>
    </div>

    <div id="controlsCompact">
      <div class="group seasonGroup">
        <button class="smallBtn" id="prevSeason" aria-label="Previous Season">‹</button>
        <select id="seasonSelect" aria-label="Select Season"></select>
        <button class="smallBtn" id="nextSeason" aria-label="Next Season">›</button>
      </div>
      <div class="group episodeGroup">
        <button class="smallBtn" id="prevEpisode" aria-label="Previous Episode">‹</button>
        <select id="episodeSelect" aria-label="Select Episode"></select>
        <button class="smallBtn" id="nextEpisode" aria-label="Next Episode">›</button>
      </div>
    </div>

    <section id="moreLikeSection" class="more-like-section" aria-live="polite">
      <div class="more-like-header">
        <h2>More Like This</h2>
      </div>
      <div id="moreLikeBox" class="more-like-box" role="region" aria-label="More like this results">
        <div id="moreLikeGrid" class="more-like-grid"></div>
        <div id="moreLikeStatus" class="more-like-status" role="status" aria-live="polite"></div>
      </div>
    </section>
  </div>

  <button id="closeBtn" aria-label="Close Player">✕</button>
</main>

<script src="../../shared/media-card.js"></script>
<script src="../../shared/media-identity.js"></script>
<script src="../../shared/embed-sandbox.js"></script>
<script src="../../shared/iframe-loader.js"></script>
<script src="./viewer.js"></script>

</body>
</html>
