<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm - TV Shows</title>

  <!-- PWA & iOS fullscreen support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Manifest & App Icon -->
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />

  <!-- Fonts & Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="../shared/access.js"></script>
  <script src="../shared/theme.js"></script>

  <script>
    const routeParams = new URLSearchParams(window.location.search);
    const showId = routeParams.get('id');
    if (showId) {
      window.location.replace(`./show.html?id=${encodeURIComponent(showId)}`);
    }
  </script>
</head>
<body>

<!-- Navbar placeholder -->
<div id="navbarContainer"></div>
<script src="../shared/navbar.js"></script>

<!-- TV sections rendered here -->
<main class="catalog-main">
  <section class="catalog-hero" aria-label="TV hub">
    <p class="catalog-eyebrow">TV</p>
    <h1>Series Hub</h1>
    <p>Track seasons faster with a cleaner layout, curated rows, and quick access to filters.</p>
  </section>
  <div class="content-mode-toggle" role="tablist" aria-label="Content mode">
    <button id="regularModeButton" class="mode-toggle-button is-active" type="button" data-mode="regular" role="tab" aria-selected="true">Regular</button>
    <button id="animeModeButton" class="mode-toggle-button" type="button" data-mode="anime" role="tab" aria-selected="false">Anime</button>
  </div>
  <button id="filtersToggleBtn" class="filters-side-toggle" type="button" aria-controls="filtersDrawer" aria-expanded="false" aria-label="Open filters" title="Filters">☰</button>
  <div id="filtersOverlay" class="filters-overlay is-hidden" aria-hidden="true"></div>
  <aside id="filtersDrawer" class="filters-drawer is-hidden" aria-hidden="true">
    <div class="filters-drawer-header">
      <h2>Filters</h2>
      <button id="closeFiltersBtn" class="filters-close-button" type="button" aria-label="Close filters">✕</button>
    </div>
    <div class="filters-drawer-body">
      <label class="filters-field">
        <span>Year From</span>
        <input id="filterYearMin" type="number" inputmode="numeric" min="1900" max="2100" placeholder="Any" />
      </label>
      <label class="filters-field">
        <span>Year To</span>
        <input id="filterYearMax" type="number" inputmode="numeric" min="1900" max="2100" placeholder="Any" />
      </label>
      <label class="filters-field">
        <span>Minimum Rating</span>
        <select id="filterRatingMin">
          <option value="">Any</option>
          <option value="5">5.0+</option>
          <option value="6">6.0+</option>
          <option value="7">7.0+</option>
          <option value="8">8.0+</option>
          <option value="9">9.0+</option>
        </select>
      </label>
      <section class="filters-group">
        <h3>Age Ratings</h3>
        <div id="filterAgeRatingOptions" class="filter-options"></div>
      </section>
      <section class="filters-group">
        <h3>Genres</h3>
        <div id="filterGenreOptions" class="filter-options"></div>
      </section>
    </div>
    <div class="filters-drawer-actions">
      <button id="clearFiltersBtn" class="filters-action secondary" type="button">Clear</button>
      <button id="applyFiltersBtn" class="filters-action primary" type="button">Apply</button>
    </div>
    <p id="filtersSummary" class="filters-summary" role="status" aria-live="polite"></p>
  </aside>
  <div id="quickFilters" class="quick-filters" aria-label="Quick category filters"></div>
  <div id="tvSections"></div>
  <div id="animeQuickFilters" class="quick-filters is-hidden" aria-label="Anime quick category filters"></div>
  <div id="animeSections" class="is-hidden"></div>
</main>


<script src="../shared/media-card.js"></script>


<!-- Load TV logic -->
<script src="./script.js"></script>

</body>
</html>
