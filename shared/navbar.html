<div class="global-banner" id="globalBanner" role="status" aria-live="polite" hidden aria-hidden="true">
  <p class="global-banner-text"></p>
  <button type="button" id="globalBannerCloseBtn" class="global-banner-close" aria-label="Dismiss global message">×</button>
</div>
<header>
  <nav class="navbar" role="navigation" aria-label="Primary navigation">
    <!-- Logo -->
    <div class="logo-container">
      <a href="./home/" data-route="/home/" class="logo" title="Go to Home">
        <span class="heart-icon" aria-hidden="true">❤</span>
        Bilm
        <span class="heart-icon" aria-hidden="true">❤</span>
      </a>
    </div>

    <!-- Nav Buttons -->
    <div class="nav-center">
      <nav>
        <button data-page="home">Home</button>
        <button data-page="movies">Movies</button>
        <button data-page="tv">TV Shows</button>
        <button data-page="settings">Settings</button>
      </nav>
    </div>

    <!-- Desktop Search Bar -->
    <div class="search-wrapper">
      <form id="navbarSearchForm" class="search-input-wrapper" action="./search/" data-route-action="/search/" method="get">
        <input type="text" id="searchInput" name="q" class="search-input" placeholder="Search..." autocomplete="off" spellcheck="false" />
        <button type="submit" class="search-icon" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button type="button" id="desktopSearchClearBtn" class="search-clear" aria-label="Clear search input" hidden>×</button>
      </form>
      <div class="account-menu-wrap" id="navbarAccountMenuWrap">
        <button type="button" id="navbarAccountBtn" class="account-btn" aria-label="Account" aria-haspopup="menu" aria-expanded="false">Account</button>
        <div class="account-menu" id="navbarAccountMenu" role="menu" hidden>
          <button type="button" id="navbarAccountLoginBtn" class="account-menu-item" role="menuitem">Log In</button>
          <button type="button" id="navbarAccountSignUpBtn" class="account-menu-item" role="menuitem">Sign Up</button>
          <button type="button" id="navbarAccountSettingsBtn" class="account-menu-item" role="menuitem">Account Settings</button>
          <button type="button" id="navbarAccountManualSyncBtn" class="account-menu-item" role="menuitem">Manual Sync</button>
          <button type="button" id="navbarAccountSignOutBtn" class="account-menu-item" role="menuitem" hidden>Sign Out</button>
          <p id="navbarAccountMenuHint" class="account-menu-hint">Log in for cloud sync.</p>
        </div>
      </div>
    </div>
  </nav>
</header>

<!-- Mobile Search Overlay -->
<div id="mobileSearchOverlay" class="mobile-search-overlay" role="dialog" aria-modal="true" aria-label="Mobile search overlay">
  <!-- Top-right Close Button -->
  <button id="mobileSearchTopCloseBtn" aria-label="Close search overlay" title="Close search overlay">×</button>

  <!-- Search Input with Icon -->
  <div class="mobile-search-input-wrapper">
    <input type="text" id="mobileSearchInput" placeholder="Search..." autocomplete="off" spellcheck="false" />

    <div class="mobile-search-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>

    <!-- Clear Search Input Button -->
    <button id="mobileSearchCloseBtn" aria-label="Clear search input">×</button>
  </div>
</div>

<div id="navbarAuthModal" class="navbar-auth-modal" hidden>
  <div class="navbar-auth-panel" role="dialog" aria-modal="true" aria-labelledby="navbarAuthTitle">
    <button type="button" id="navbarAuthCloseBtn" class="navbar-auth-close" aria-label="Close account modal">×</button>
    <h3 id="navbarAuthTitle">Log In</h3>
    <p id="navbarAuthHint">Use your email and password.</p>
    <form id="navbarAuthForm" class="navbar-auth-form" autocomplete="on">
      <input id="navbarAuthEmail" name="email" type="email" placeholder="Email..." aria-label="Email" autocomplete="email" spellcheck="false" required />
      <div class="navbar-auth-password-wrap">
        <input id="navbarAuthPassword" name="password" type="password" placeholder="Password..." aria-label="Password" autocomplete="current-password" required />
        <button type="button" id="navbarAuthPasswordToggleBtn" class="navbar-auth-password-toggle" aria-label="Show password" title="Show password">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8" />
          </svg>
        </button>
      </div>
      <p id="navbarAuthStatus" class="navbar-auth-status" aria-live="polite"></p>
      <div class="navbar-auth-actions">
        <button type="submit" id="navbarAuthSubmitBtn">Continue</button>
        <button type="button" id="navbarAuthSwitchBtn" class="navbar-auth-secondary">Create account</button>
      </div>
    </form>
  </div>
</div>
