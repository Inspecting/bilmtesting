<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm 💜 - Search Results</title>

  <!-- PWA & iOS fullscreen meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Manifest & Apple Touch Icon -->
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />
    
  <link rel="icon" type="image/png" href="../icon.png" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet" />

  <!-- Navbar CSS -->
  <link rel="stylesheet" href="../shared/theme.css" />

  <script src="../shared/access.js"></script>
  <script src="../shared/theme.js"></script>
  
    
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    main {
      flex: 1;
      width: 100vw;
      min-height: 100vh;
      overflow-y: auto;
      padding: 24px;
    }
    h1 {
      color: var(--text-primary);
      margin-bottom: 20px;
      text-align: center;
      font-weight: 700;
    }
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-button {
      background: var(--surface-2);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
    }
    .filter-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 14px var(--accent-glow);
      border-color: var(--accent-soft);
    }
    .filter-button.active {
      background: var(--accent);
      color: var(--text-inverse);
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    section {
      margin-bottom: 30px;
    }
    section h2 {
      color: var(--text-muted);
      margin-bottom: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 14px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 140px));
      justify-content: center;
      gap: 16px;
    }
    .movie-card {
      width: 140px;
      height: 248px;
      cursor: pointer;
      border-radius: var(--radius-md);
      overflow: hidden;
      background-color: var(--surface-2);
      box-shadow: var(--shadow-md);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .movie-card:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 0 18px var(--accent-glow);
      border-color: var(--accent-soft);
    }
    .movie-card img {
      width: 100%;
      height: 188px;
      object-fit: cover;
      border-radius: 12px 12px 0 0;
      background: rgba(255, 255, 255, 0.05);
    }
    .card-meta {
      padding: 6px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 30px;
      justify-content: center;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .card-subtitle {
      font-size: 11px;
      color: var(--text-subtle);
      line-height: 1.2;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .sort-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: -8px 0 20px;
      flex-wrap: wrap;
    }
    .sort-button {
      background: var(--surface-2);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .sort-button.active {
      background: color-mix(in srgb, var(--accent) 20%, var(--surface-2));
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .card-badge-stack {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      max-width: calc(100% - 16px);
      pointer-events: none;
    }
    .source-badge-overlay {
      align-self: flex-start;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-inverse);
      background: color-mix(in srgb, var(--accent) 75%, #1f2937 25%);
      padding: 2px 6px;
      border-radius: 999px;
      pointer-events: none;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rating-badge-overlay {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-primary);
      background: color-mix(in srgb, var(--surface-3) 88%, #111827 12%);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 999px;
      width: fit-content;
    }
    .no-results {
      text-align: center;
      color: var(--text-subtle);
      font-size: 16px;
      margin-top: 40px;
      background: var(--surface-2);
      border: 1px dashed var(--border);
      padding: 16px;
      border-radius: var(--radius-md);
    }
    #resultsSentinel {
      width: 100%;
      height: 1px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- Shared navbar -->
  <div id="navbar-placeholder"></div>
  <script src="../shared/navbar.js"></script>


  <main>
    <h1 id="resultsTitle">Search Results for ""</h1>
    <div class="filter-bar" role="tablist" aria-label="Search filters">
      <button class="filter-button active" type="button" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-button" type="button" data-filter="movies" role="tab" aria-selected="false">Movies</button>
      <button class="filter-button" type="button" data-filter="tv" role="tab" aria-selected="false">TV Shows</button>
    </div>
    <div class="sort-bar" role="group" aria-label="Sort search results">
      <button class="sort-button active" type="button" data-sort="relevance" aria-pressed="true">Sort: Relevance</button>
      <button class="sort-button" type="button" data-sort="year" aria-pressed="false">Sort: Year</button>
    </div>

    <section id="combinedSection">
      <h2>Results</h2>
      <p class="no-results" id="resultsMessage" hidden></p>
      <div class="results-grid" id="combinedResults"></div>
      <div id="resultsSentinel" aria-hidden="true"></div>
    </section>
  </main>

  <script src="../shared/media-card.js"></script>
    
  <script>
    function detectBasePath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const appRoots = new Set(['home', 'movies', 'tv', 'search', 'settings', 'random', 'test', 'shared', 'index.html']);
      if (!parts.length || appRoots.has(parts[0])) return '';
      if (parts.length > 1 && appRoots.has(parts[1])) return `/${parts[0]}`;
      return '';
    }

    const BASE_URL = detectBasePath();

    const INCOGNITO_SEARCH_MAP_KEY = 'bilm-incognito-search-map';
    const urlParams = new URLSearchParams(window.location.search);
    const rawQuery = urlParams.get('q') || '';
    const currentSettings = window.bilmTheme?.getSettings?.() || {};

    function resolveSearchQuery(value) {
      if (!value) return '';
      if (currentSettings.incognito !== true) return value;
      try {
        const map = JSON.parse(sessionStorage.getItem(INCOGNITO_SEARCH_MAP_KEY) || '{}') || {};
        return map[value] || value;
      } catch {
        return value;
      }
    }

    const currentQuery = resolveSearchQuery(rawQuery);

    const resultsTitle = document.getElementById('resultsTitle');
    const combinedSection = document.getElementById('combinedSection');
    const resultsMessage = document.getElementById('resultsMessage');
    const combinedResults = document.getElementById('combinedResults');
    const resultsSentinel = document.getElementById('resultsSentinel');
    const filterButtons = Array.from(document.querySelectorAll('.filter-button'));
    const sortButtons = Array.from(document.querySelectorAll('.sort-button'));

    const NO_IMAGE = 'https://via.placeholder.com/140x210?text=No+Image';
    const queryNormalized = currentQuery.trim();
    let cachedMovies = [];
    let cachedTvShows = [];
    let cachedAll = [];
    let activeFilter = 'all';
    let activeSort = 'relevance';
    const API_COOLDOWN_MS = 120;
    const SEARCH_SLOW_PROVIDER_THRESHOLD_MS = 2000;
    const SEARCH_REQUEST_TIMEOUT_MS = 6500;
    const SEARCH_PAGE_SIZE = 36;
    const SEARCH_RENDER_CHUNK_SIZE = 10;
    const SEARCH_RESOLVE_LIMIT = 4;
    const SEARCH_RESOLVE_CONCURRENCY = 2;
    const apiCooldownByHost = new Map();
    let renderedResultsCount = 0;
    let currentVisibleItems = [];
    let searchRenderToken = 0;
    let resultsObserver = null;
    let resultsRenderInProgress = false;
    let searchLoadComplete = false;

    function normalizeTitle(value) {
      return (value || '').trim().toLowerCase();
    }

    function createMovieKey(title, year) {
      return `${normalizeTitle(title)}-${year || 'N/A'}`;
    }

    function createTvKey(title, year) {
      return `${normalizeTitle(title)}-${year || 'N/A'}`;
    }

    function delay(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }


    async function waitForApiCooldown(url) {
      let host = 'default';
      try {
        host = new URL(url, window.location.origin).host || 'default';
      } catch {
        host = 'default';
      }
      const now = Date.now();
      const nextAllowedAt = apiCooldownByHost.get(host) || 0;
      const waitMs = nextAllowedAt - now;
      if (waitMs > 0) {
        await new Promise((resolve) => setTimeout(resolve, waitMs));
      }
      apiCooldownByHost.set(host, Date.now() + API_COOLDOWN_MS);
    }

    function buildSearchBackupUrl(rawUrl) {
      try {
        const parsed = new URL(String(rawUrl || '').trim(), window.location.href);
        if (parsed.origin !== 'https://storage-api.watchbilm.org') return '';
        if (parsed.pathname.startsWith('/media/tmdb/')) {
          const tmdbPath = parsed.pathname.slice('/media/tmdb/'.length);
          const backup = new URL(`${window.location.origin}${BASE_URL}/api/tmdb/${tmdbPath}`);
          parsed.searchParams.forEach((value, key) => {
            if (String(key || '').toLowerCase() === 'api_key') return;
            backup.searchParams.append(key, value);
          });
          return backup.toString();
        }
        if (parsed.pathname.startsWith('/media/tvmaze/')) {
          const tvmazePath = parsed.pathname.slice('/media/tvmaze'.length);
          return `https://api.tvmaze.com${tvmazePath}${parsed.search}`;
        }
        if (parsed.pathname === '/media/omdb') {
          return `https://www.omdbapi.com/${parsed.search}`;
        }
      } catch {
        return '';
      }
      return '';
    }

    async function fetchJSONDirect(url, options = {}) {
      const requestUrl = String(url || '').trim();
      if (!requestUrl) throw new Error('Missing request URL');
      const timeoutMs = Math.max(500, Number(options.timeoutMs || SEARCH_REQUEST_TIMEOUT_MS) || SEARCH_REQUEST_TIMEOUT_MS);
      const controller = typeof AbortController === 'function' ? new AbortController() : null;
      const timeoutId = controller
        ? setTimeout(() => {
            try {
              controller.abort();
            } catch {
              // Ignore abort failures.
            }
          }, timeoutMs)
        : null;
      try {
        await waitForApiCooldown(requestUrl);
        const response = await fetch(requestUrl, controller ? { signal: controller.signal } : undefined);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      } catch (error) {
        if (error?.name === 'AbortError') {
          throw new Error(`Request timeout (${timeoutMs}ms)`);
        }
        throw error;
      } finally {
        if (timeoutId) clearTimeout(timeoutId);
      }
    }

    async function fetchJSON(url, options = {}) {
      const primaryUrl = String(url || '').trim();
      if (!primaryUrl) throw new Error('Missing request URL');
      const slowThresholdMs = Math.max(
        300,
        Number(options.slowThresholdMs || SEARCH_SLOW_PROVIDER_THRESHOLD_MS) || SEARCH_SLOW_PROVIDER_THRESHOLD_MS
      );
      const timeoutMs = Math.max(
        slowThresholdMs + 500,
        Number(options.timeoutMs || SEARCH_REQUEST_TIMEOUT_MS) || SEARCH_REQUEST_TIMEOUT_MS
      );
      const backupUrl = buildSearchBackupUrl(primaryUrl);
      const primaryPromise = fetchJSONDirect(primaryUrl, { timeoutMs });
      if (!backupUrl) return primaryPromise;

      const firstOutcome = await Promise.race([
        primaryPromise.then((data) => ({ type: 'primary-success', data })).catch((error) => ({ type: 'primary-failure', error })),
        delay(slowThresholdMs).then(() => ({ type: 'primary-slow' }))
      ]);

      if (firstOutcome.type === 'primary-success') return firstOutcome.data;

      if (firstOutcome.type === 'primary-failure') {
        console.info('[api-fallback] search fetch using backup provider', {
          reason: String(firstOutcome.error?.message || firstOutcome.error || 'primary-failure')
        });
        return fetchJSONDirect(backupUrl, { timeoutMs });
      }

      console.info('[api-fallback] search fetch provider slow; racing backup provider', {
        slowThresholdMs
      });
      const backupPromise = fetchJSONDirect(backupUrl, { timeoutMs });
      const raceOutcome = await Promise.race([
        primaryPromise.then((data) => ({ type: 'primary-success', data })).catch((error) => ({ type: 'primary-failure', error })),
        backupPromise.then((data) => ({ type: 'backup-success', data })).catch((error) => ({ type: 'backup-failure', error }))
      ]);

      if (raceOutcome.type === 'primary-success' || raceOutcome.type === 'backup-success') return raceOutcome.data;
      if (raceOutcome.type === 'primary-failure') return backupPromise;
      return primaryPromise;
    }

    function addTmdbMovieResultsToMap(targetMap, movies) {
      (movies || []).forEach(item => {
        const key = createMovieKey(item.title, item.release_date?.slice(0, 4));
        if (!targetMap.has(key)) {
          targetMap.set(key, {
            title: item.title,
            year: item.release_date?.slice(0, 4) || 'N/A',
            img: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : NO_IMAGE,
            tmdbId: item.id,
            link: `${BASE_URL}/movies/show.html?id=${item.id}`,
            source: 'TMDB',
            rating: item.vote_average,
            popularity: item.popularity || 0,
            type: 'movie'
          });
        }
      });
    }

    function addTmdbTvResultsToMap(targetMap, shows) {
      (shows || []).forEach(item => {
        const key = createTvKey(item.name, item.first_air_date?.slice(0, 4));
        if (!targetMap.has(key)) {
          targetMap.set(key, {
            title: item.name,
            year: item.first_air_date?.slice(0, 4) || 'N/A',
            img: item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : NO_IMAGE,
            tmdbId: item.id,
            link: `${BASE_URL}/tv/show.html?id=${item.id}`,
            source: 'TMDB',
            rating: item.vote_average,
            popularity: item.popularity || 0,
            type: 'tv'
          });
        }
      });
    }

    function addOmdbMovieResultsToMap(targetMap, movies) {
      (movies || []).forEach(item => {
        const key = createMovieKey(item.Title, item.Year);
        if (!targetMap.has(key)) {
          targetMap.set(key, {
            title: item.Title,
            year: item.Year,
            img: item.Poster !== 'N/A' ? item.Poster : NO_IMAGE,
            imdbId: item.imdbID,
            tmdbId: null,
            link: '',
            source: 'OMDB',
            popularity: 0,
            type: 'movie'
          });
        }
      });
    }

    function addTvmazeResultsToMap(targetMap, shows) {
      (shows || []).forEach(item => {
        const key = createTvKey(item.title, item.year);
        if (!targetMap.has(key)) {
          targetMap.set(key, item);
        }
      });
    }

    function syncCachedSearchData(movieMap, tvMap) {
      cachedMovies = Array.from(movieMap.values());
      cachedTvShows = Array.from(tvMap.values());
      cachedAll = [...cachedMovies, ...cachedTvShows];
    }

    function getYearValue(item) {
      const parsed = Number.parseInt(item.year, 10);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function titleSimilarityScore(title, query) {
      const normalizedTitle = normalizeTitle(title);
      const normalizedQuery = normalizeTitle(query);
      if (!normalizedTitle || !normalizedQuery) return 0;
      if (normalizedTitle === normalizedQuery) return 120;
      if (normalizedTitle.startsWith(normalizedQuery)) return 80;
      if (normalizedTitle.includes(normalizedQuery)) return 60;
      return 0;
    }

    function createRelevanceScore(item) {
      const sourceWeight = {
        TMDB: 45,
        OMDB: 25,
        TVmaze: 20
      };
      const queryYear = Number.parseInt(queryNormalized.match(/\b(19|20)\d{2}\b/)?.[0], 10);
      const itemYear = getYearValue(item);
      const yearPenalty = Number.isFinite(queryYear) && itemYear ? Math.abs(queryYear - itemYear) : 0;
      const hasTmdbIdBonus = item.tmdbId ? 30 : -80;
      return titleSimilarityScore(item.title, queryNormalized)
        + (sourceWeight[item.source] || 0)
        + hasTmdbIdBonus
        + (item.popularity || 0) * 0.05
        - yearPenalty;
    }

    function sortItems(items) {
      const sorted = [...items];
      if (activeSort === 'year') {
        sorted.sort((a, b) => getYearValue(b) - getYearValue(a) || createRelevanceScore(b) - createRelevanceScore(a));
        return sorted;
      }
      sorted.sort((a, b) => createRelevanceScore(b) - createRelevanceScore(a));
      return sorted;
    }

    async function resolveMovieTmdbId({ imdbId, title, year }) {
      if (imdbId) {
        try {
          const found = await fetchJSON(`https://storage-api.watchbilm.org/media/tmdb/find/${encodeURIComponent(imdbId)}?external_source=imdb_id`);
          const byExternal = found?.movie_results?.[0]?.id;
          if (byExternal) return byExternal;
        } catch {
          // fallback below
        }
      }
      try {
        const query = encodeURIComponent(title || '');
        const yearQuery = year && year !== 'N/A' ? `&year=${encodeURIComponent(year)}` : '';
        const searchData = await fetchJSON(`https://storage-api.watchbilm.org/media/tmdb/search/movie?query=${query}${yearQuery}`);
        return searchData?.results?.[0]?.id || null;
      } catch {
        return null;
      }
    }

    async function resolveTvTmdbId({ title, year }) {
      try {
        const query = encodeURIComponent(title || '');
        const firstAirDateYear = year && year !== 'N/A' ? `&first_air_date_year=${encodeURIComponent(year)}` : '';
        const searchData = await fetchJSON(`https://storage-api.watchbilm.org/media/tmdb/search/tv?query=${query}${firstAirDateYear}`);
        return searchData?.results?.[0]?.id || null;
      } catch {
        return null;
      }
    }

    async function mapWithConcurrency(items, concurrency, mapper) {
      const source = Array.isArray(items) ? items : [];
      const maxWorkers = Math.max(1, Number(concurrency || 1) || 1);
      let cursor = 0;
      const workers = Array.from({ length: Math.min(maxWorkers, source.length) }, async () => {
        while (cursor < source.length) {
          const currentIndex = cursor;
          cursor += 1;
          await mapper(source[currentIndex], currentIndex);
        }
      });
      await Promise.all(workers);
    }

    async function normalizeMovieEntries(entries, limit = 10) {
      const nextEntries = [...entries];
      const unresolved = nextEntries.filter(item => !item.tmdbId).slice(0, limit);
      await mapWithConcurrency(unresolved, SEARCH_RESOLVE_CONCURRENCY, async (item) => {
        item.tmdbId = await resolveMovieTmdbId(item);
        item.link = item.tmdbId ? `${BASE_URL}/movies/show.html?id=${item.tmdbId}` : '';
      });
      return nextEntries;
    }

    async function normalizeTvEntries(entries, limit = 10) {
      const nextEntries = [...entries];
      const unresolved = nextEntries.filter(item => !item.tmdbId).slice(0, limit);
      await mapWithConcurrency(unresolved, SEARCH_RESOLVE_CONCURRENCY, async (item) => {
        item.tmdbId = await resolveTvTmdbId(item);
        item.link = item.tmdbId ? `${BASE_URL}/tv/show.html?id=${item.tmdbId}` : '';
      });
      return nextEntries;
    }

    resultsTitle.textContent = `Search Results for "${queryNormalized}"`;



    function fetchTvmazeShows(query) {
      if (!query) return Promise.resolve([]);
      const url = `https://storage-api.watchbilm.org/media/tvmaze/search/shows?q=${encodeURIComponent(query)}`;
      return fetchJSON(url)
        .then(data => {
          if (!Array.isArray(data)) return [];
          return data.map(item => {
            const show = item.show;
            return {
              title: show.name,
              year: show.premiered ? show.premiered.slice(0,4) : 'N/A',
              img: show.image?.medium || NO_IMAGE,
              tmdbId: null,
              source: 'TVmaze',
              popularity: show.weight || 0,
              type: 'tv',
              link: ''
            };
          });
        })
        .catch(() => []);
    }

    if (queryNormalized) {
      (async () => {
        searchLoadComplete = false;
        resultsMessage.textContent = 'Searching...';
        resultsMessage.hidden = false;
        combinedSection.style.display = 'block';

        const tmdbMovieUrl = `https://storage-api.watchbilm.org/media/tmdb/search/movie?query=${encodeURIComponent(queryNormalized)}`;
        const tmdbTvUrl = `https://storage-api.watchbilm.org/media/tmdb/search/tv?query=${encodeURIComponent(queryNormalized)}`;
        const omdbUrl = `https://storage-api.watchbilm.org/media/omdb?s=${encodeURIComponent(queryNormalized)}&type=movie`;
        const movieMap = new Map();
        const tvMap = new Map();

        const tmdbMoviesPromise = fetchJSON(tmdbMovieUrl).catch(() => ({ results: [] }));
        const tmdbTVPromise = fetchJSON(tmdbTvUrl).catch(() => ({ results: [] }));
        const omdbMoviesPromise = fetchJSON(omdbUrl).catch(() => ({ Search: [] }));
        const tvmazeShowsPromise = fetchTvmazeShows(queryNormalized);

        const [tmdbMovies, tmdbTV] = await Promise.all([tmdbMoviesPromise, tmdbTVPromise]);
        addTmdbMovieResultsToMap(movieMap, tmdbMovies.results || []);
        addTmdbTvResultsToMap(tvMap, tmdbTV.results || []);
        syncCachedSearchData(movieMap, tvMap);
        updateResults(activeFilter, { finalized: false });

        const [omdbMovies, tvmazeShows] = await Promise.all([omdbMoviesPromise, tvmazeShowsPromise]);
        addOmdbMovieResultsToMap(movieMap, omdbMovies.Search || []);
        addTvmazeResultsToMap(tvMap, tvmazeShows);
        syncCachedSearchData(movieMap, tvMap);
        updateResults(activeFilter, { finalized: false });

        const [normalizedMovies, normalizedTvShows] = await Promise.all([
          normalizeMovieEntries(cachedMovies, SEARCH_RESOLVE_LIMIT),
          normalizeTvEntries(cachedTvShows, SEARCH_RESOLVE_LIMIT)
        ]);
        cachedMovies = normalizedMovies;
        cachedTvShows = normalizedTvShows;
        cachedAll = [...cachedMovies, ...cachedTvShows];
        searchLoadComplete = true;
        updateResults(activeFilter, { finalized: true });
      })().catch((err) => {
        console.error('Search failed', err);
        disconnectResultsObserver();
        renderedResultsCount = 0;
        currentVisibleItems = [];
        combinedResults.innerHTML = '';
        searchLoadComplete = true;
        resultsMessage.textContent = 'Failed to load results.';
        resultsMessage.hidden = false;
      });
    } else {
      disconnectResultsObserver();
      renderedResultsCount = 0;
      currentVisibleItems = [];
      combinedResults.innerHTML = '';
      searchLoadComplete = true;
      resultsMessage.textContent = 'Please enter a search term.';
      resultsMessage.hidden = false;
    }

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        activeFilter = button.dataset.filter;
        updateResults(activeFilter);
        filterButtons.forEach(btn => {
          const isActive = btn === button;
          btn.classList.toggle('active', isActive);
          btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
      });
    });

    sortButtons.forEach(button => {
      button.addEventListener('click', () => {
        activeSort = button.dataset.sort;
        sortButtons.forEach(btn => {
          const isActive = btn === button;
          btn.classList.toggle('active', isActive);
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
        updateResults(activeFilter);
      });
    });

    function queueFrame(task) {
      if (typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(task);
      } else {
        setTimeout(task, 16);
      }
    }

    function disconnectResultsObserver() {
      if (!resultsObserver) return;
      resultsObserver.disconnect();
      resultsObserver = null;
    }

    function ensureResultsObserver() {
      if (!resultsSentinel) return;
      if (renderedResultsCount >= currentVisibleItems.length) {
        disconnectResultsObserver();
        return;
      }
      if (typeof window.IntersectionObserver !== 'function') {
        renderResults(combinedResults, currentVisibleItems);
        return;
      }
      if (resultsObserver) return;
      resultsObserver = new IntersectionObserver((entries) => {
        if (!entries.some((entry) => entry.isIntersecting)) return;
        renderResults(combinedResults, currentVisibleItems);
      }, {
        root: null,
        rootMargin: '700px 0px',
        threshold: 0.01
      });
      resultsObserver.observe(resultsSentinel);
    }

    function createFallbackResultCard(item) {
      const card = document.createElement('article');
      card.className = 'movie-card';
      card.dataset.source = String(item?.source || '');

      const image = document.createElement('img');
      image.src = item?.img || NO_IMAGE;
      image.alt = `${item?.title || 'Untitled'} poster`;
      image.loading = 'lazy';
      image.decoding = 'async';
      image.addEventListener('error', () => {
        image.src = NO_IMAGE;
      });

      const meta = document.createElement('div');
      meta.className = 'card-meta';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = String(item?.title || 'Untitled');

      const subtitle = document.createElement('div');
      subtitle.className = 'card-subtitle';
      const year = String(item?.year || 'N/A').trim() || 'N/A';
      const source = String(item?.source || '').trim() || 'Unknown source';
      subtitle.textContent = `${year} · ${source}`;

      meta.appendChild(title);
      meta.appendChild(subtitle);
      card.appendChild(image);
      card.appendChild(meta);

      const destination = String(item?.link || '').trim();
      if (destination) {
        card.tabIndex = 0;
        card.setAttribute('role', 'link');
        const openDestination = () => {
          window.location.href = destination;
        };
        card.addEventListener('click', openDestination);
        card.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          openDestination();
        });
      }

      return card;
    }

    function createSearchResultCard(item) {
      const createMediaCard = window.BilmMediaCard?.createMediaCard;
      if (typeof createMediaCard === 'function') {
        try {
          const card = createMediaCard({
            item,
            className: 'movie-card',
            badgeClassName: 'source-badge-overlay',
            dataset: { source: item.source }
          });
          if (card instanceof HTMLElement) return card;
        } catch (error) {
          console.warn('Falling back to basic result card renderer:', error);
        }
      }
      return createFallbackResultCard(item);
    }

    function updateResults(filter, options = {}) {
      const finalized = options.finalized ?? searchLoadComplete;
      let items = [];
      if (filter === 'movies') {
        items = cachedMovies;
      } else if (filter === 'tv') {
        items = cachedTvShows;
      } else {
        items = cachedAll;
      }

      const validItems = sortItems(items.filter(item => Boolean(item.link)));
      currentVisibleItems = validItems;
      if (validItems.length > 0) {
        renderResults(combinedResults, validItems, { reset: true });
        resultsMessage.hidden = true;
        combinedSection.style.display = 'block';
      } else {
        disconnectResultsObserver();
        renderedResultsCount = 0;
        combinedResults.innerHTML = '';
        if (!finalized) {
          resultsMessage.textContent = 'Searching more sources...';
        } else {
          resultsMessage.textContent = items.length > 0
            ? 'Results were found, but some sources could not be linked yet. Try another query.'
            : 'No results found.';
        }
        resultsMessage.hidden = false;
        combinedSection.style.display = 'block';
      }
    }

    function renderResults(container, items, options = {}) {
      const reset = options?.reset === true;
      if (reset) {
        searchRenderToken += 1;
        renderedResultsCount = 0;
        disconnectResultsObserver();
        container.innerHTML = '';
        resultsRenderInProgress = false;
      }
      if (resultsRenderInProgress) return;

      const renderToken = searchRenderToken;
      const nextSlice = items.slice(renderedResultsCount, renderedResultsCount + SEARCH_PAGE_SIZE);
      if (!nextSlice.length) {
        ensureResultsObserver();
        return;
      }

      resultsRenderInProgress = true;
      let index = 0;
      const appendChunk = () => {
        if (renderToken !== searchRenderToken) {
          resultsRenderInProgress = false;
          return;
        }
        const fragment = document.createDocumentFragment();
        const chunkEnd = Math.min(index + SEARCH_RENDER_CHUNK_SIZE, nextSlice.length);
        while (index < chunkEnd) {
          const item = nextSlice[index];
          const card = createSearchResultCard(item);
          fragment.appendChild(card);
          index += 1;
        }
        container.appendChild(fragment);
        if (index < nextSlice.length) {
          queueFrame(appendChunk);
          return;
        }
        renderedResultsCount += nextSlice.length;
        resultsRenderInProgress = false;
        ensureResultsObserver();
      };

      appendChunk();
    }
  </script>
</body>
</html>
