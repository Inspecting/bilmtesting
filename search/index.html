<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — Search</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/foundation.css" />
  <link rel="stylesheet" href="../shared/navbar.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="../shared/access.js"></script>
  <script src="../shared/theme.js"></script>
  <script src="../shared/foundation.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="search-page page-frame page-stack">
    <header class="search-head surface-panel">
      <p class="section-label">Discovery</p>
      <h1 id="resultsTitle">Search</h1>
      <p class="search-sub">Find movies and TV shows with fast, unified results.</p>
    </header>

    <section class="surface-panel controls">
      <div class="filter-bar" role="tablist" aria-label="Result filter">
        <button class="filter-button active" type="button" data-filter="all">All</button>
        <button class="filter-button" type="button" data-filter="movies">Movies</button>
        <button class="filter-button" type="button" data-filter="tv">TV Shows</button>
      </div>
      <div class="sort-bar" aria-label="Sort results">
        <button class="sort-button active" type="button" data-sort="relevance">Best match</button>
        <button class="sort-button" type="button" data-sort="year">Newest year</button>
      </div>
      <p id="resultsMessage" class="results-message" hidden></p>
    </section>

    <section id="combinedSection">
      <div id="combinedResults" class="results-grid"></div>
    </section>
  </main>

  <script src="../shared/navbar.js" defer></script>
  <script src="./script.js" defer></script>
</body>
</html>
