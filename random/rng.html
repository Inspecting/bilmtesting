<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — Random Number</title>
  <link rel="stylesheet" href="../shared/theme.css" /><link rel="stylesheet" href="../shared/foundation.css" />
  <style>body{margin:0;display:grid;place-items:center;min-height:100vh}.box{padding:20px;text-align:center}.num{font-size:2rem;margin:8px 0}.btn{padding:9px 12px;border-radius:10px;border:1px solid var(--panel-border-color);background:color-mix(in srgb,var(--surface-3) 84%,transparent);color:var(--text-primary)}</style>
</head><body><section class="box surface-panel"><p class="section-label">Utility</p><h1>Random Number</h1><p id="n" class="num">0</p><button id="g" class="btn">Generate</button></section><script>const n=document.getElementById('n');document.getElementById('g').onclick=()=>{n.textContent=String(Math.floor(Math.random()*1000));};</script></body></html>
