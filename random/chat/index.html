<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm - Chat</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="../../manifest.json" />
  <link rel="apple-touch-icon" href="../../icon.png" />
  <link rel="icon" type="image/png" href="../../icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/theme.css" />
  <link rel="stylesheet" href="./chat.css" />
  <script src="../../shared/access.js"></script>
  <script src="../../shared/theme.js"></script>
</head>
<body>
  <div id="navbarContainer"></div>
  <script src="../../shared/navbar.js"></script>

  <main class="chat-page">
    <section class="chat-sidebar">
      <div class="chat-sidebar-header">
        <h1>Chat</h1>
        <p id="chatLoginStatus">Checking account status...</p>
      </div>
      <div class="chat-sidebar-actions">
        <button id="newChatBtn" class="chat-btn chat-btn-primary" type="button">New Chat</button>
        <button id="refreshChatsBtn" class="chat-btn chat-btn-ghost" type="button">Refresh</button>
      </div>
      <label class="chat-search-wrap" for="conversationFilterInput">
        <span>Find conversation</span>
        <input id="conversationFilterInput" type="search" placeholder="Type an email..." autocomplete="off" spellcheck="false" />
      </label>
      <div id="conversationList" class="conversation-list" aria-live="polite"></div>
    </section>

    <section class="chat-main">
      <div id="chatEmptyState" class="chat-empty">
        <h2>No Chat Open</h2>
        <p>Open a conversation from the left side or start a new one by email.</p>
      </div>

      <div id="chatView" class="chat-view" hidden>
        <header class="chat-view-header">
          <div>
            <h2 id="activeChatTitle">Conversation</h2>
            <p id="activeChatMeta">No messages yet.</p>
          </div>
          <div class="chat-view-actions">
            <button id="deleteMessagesBtn" class="chat-btn chat-btn-ghost" type="button">Delete Chats</button>
            <button id="selectAllMessagesBtn" class="chat-btn chat-btn-ghost" type="button" hidden>Select All</button>
            <button id="cancelMessageSelectionBtn" class="chat-btn chat-btn-ghost" type="button" hidden>Cancel</button>
            <button id="confirmDeleteMessagesBtn" class="chat-btn chat-btn-danger" type="button" hidden>Delete Chats</button>
          </div>
        </header>

        <div id="messageList" class="message-list" aria-live="polite"></div>

        <form id="messageComposer" class="message-composer" autocomplete="off">
          <textarea
            id="messageInput"
            rows="1"
            maxlength="2000"
            placeholder="Write a message..."
            required
          ></textarea>
          <div class="message-composer-actions">
            <span id="composerStatus" class="composer-status"></span>
            <span id="messageCharCount" class="composer-char-count">0/2000</span>
            <button id="sendMessageBtn" class="chat-btn chat-btn-primary" type="submit">Send</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="newChatModal" class="chat-modal" hidden>
    <div class="chat-modal-panel" role="dialog" aria-modal="true" aria-labelledby="newChatModalTitle">
      <button type="button" id="newChatModalCloseBtn" class="chat-modal-close" aria-label="Close">×</button>
      <h3 id="newChatModalTitle">Start New Chat</h3>
      <p>Enter the user email you want to chat with.</p>
      <form id="newChatForm" class="chat-modal-form">
        <input id="newChatEmailInput" type="email" placeholder="name@example.com" autocomplete="email" required />
        <p id="newChatFormStatus" class="chat-modal-status" aria-live="polite"></p>
        <div class="chat-modal-actions">
          <button type="button" id="cancelNewChatBtn" class="chat-btn chat-btn-ghost">Cancel</button>
          <button type="submit" class="chat-btn chat-btn-primary">Open Chat</button>
        </div>
      </form>
    </div>
  </div>

  <div id="authPromptModal" class="chat-modal" hidden>
    <div class="chat-modal-panel" role="dialog" aria-modal="true" aria-labelledby="authPromptTitle">
      <button type="button" id="authPromptCloseBtn" class="chat-modal-close" aria-label="Close">×</button>
      <h3 id="authPromptTitle">Sign In Required</h3>
      <p id="authPromptMessage">To use chat, log in or create an account.</p>
      <div class="chat-modal-actions auth-prompt-actions">
        <button type="button" id="authPromptCancelBtn" class="chat-btn chat-btn-ghost">Not Now</button>
        <button type="button" id="authPromptSignupBtn" class="chat-btn chat-btn-ghost">Create Account</button>
        <button type="button" id="authPromptLoginBtn" class="chat-btn chat-btn-primary">Log In</button>
      </div>
    </div>
  </div>

  <script src="../../shared/toast.js" defer></script>
  <script src="../../shared/auth.js" defer></script>
  <script src="./chat.js" defer></script>
</body>
</html>
