<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Bilm — Reset Local Data</title><link rel="stylesheet" href="../shared/theme.css"/><link rel="stylesheet" href="../shared/foundation.css"/><style>body{margin:0;display:grid;place-items:center;min-height:100vh}.box{padding:20px;max-width:520px}.btn{padding:9px 12px;border-radius:10px;border:1px solid var(--panel-border-color);background:color-mix(in srgb,var(--surface-3) 84%,transparent);color:var(--text-primary)}p{color:var(--text-muted)}</style></head><body><section class="box surface-panel"><p class="section-label">Utility</p><h1>Reset Local Data</h1><p>Clears locally saved lists/settings from this browser.</p><button id="r" class="btn">Reset now</button><p id="m"></p></section><script>document.getElementById('r').onclick=()=>{localStorage.clear();sessionStorage.clear();document.getElementById('m').textContent='Done. Reload the app.';};</script></body></html>
