<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — Settings</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/foundation.css" />
  <link rel="stylesheet" href="../shared/navbar.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="../shared/access.js"></script>
  <script src="../shared/theme.js"></script>
  <script src="../shared/foundation.js"></script>
</head>
<body>
  <div id="navbarContainer"></div>
  <main class="settings-page page-frame page-stack">
    <header class="surface-panel panel"><p class="section-label">Phase 5</p><h1>Settings</h1></header>

    <section class="surface-panel panel">
      <h2>Appearance & Privacy</h2>
      <div class="row"><label>Theme</label><select id="themeSelect"><option value="dark">Dark</option><option value="light">Light</option></select></div>
      <div class="row"><label>Particles</label><input id="particlesToggle" type="checkbox"></div>
      <div class="row"><label>Motion</label><input id="motionToggle" type="checkbox"></div>
      <div class="row"><label>Loading screen</label><input id="loadingToggle" type="checkbox"></div>
      <div class="row"><label>Incognito mode</label><input id="incognitoToggle" type="checkbox"></div>
      <div class="row"><label>Save search history</label><input id="searchHistoryToggle" type="checkbox"></div>
    </section>

    <section class="surface-panel panel nav-links">
      <a href="./account/">Account settings</a>
      <a href="./history/">History manager</a>
    </section>
  </main>
  <script src="../shared/navbar.js" defer></script>
  <script src="./script.js" defer></script>
</body>
</html>
