<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — Account</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="../../manifest.json" />
  <link rel="apple-touch-icon" href="../../icon.png" />
  <link rel="stylesheet" href="../../shared/theme.css" />
  <link rel="stylesheet" href="../../shared/foundation.css" />
  <link rel="stylesheet" href="../../shared/navbar.css" />

<body>
  <div id="navbarContainer"></div>
  <main class="account-page page-frame page-stack">
    <section class="surface-panel panel">
      <p class="section-label">Account</p>
      <h1 id="accountTitle">Signed out</h1>
      <p id="accountMeta">Sign in to sync account preferences.</p>
      <div class="actions">
        <button id="signInBtn" type="button">Sign in</button>
        <button id="signOutBtn" type="button" hidden>Sign out</button>

    </section>
  </main>
  <script src="../../shared/navbar.js" defer></script>
  <script src="./script.js" defer></script>
