<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — History</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="../../manifest.json" />
  <link rel="apple-touch-icon" href="../../icon.png" />
  <link rel="stylesheet" href="../../shared/theme.css" />
  <link rel="stylesheet" href="../../shared/foundation.css" />
  <link rel="stylesheet" href="../../shared/navbar.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="../../shared/access.js"></script>
  <script src="../../shared/theme.js"></script>
  <script src="../../shared/foundation.js"></script>
</head>
<body>
  <div id="navbarContainer"></div>
  <main class="history-page page-frame page-stack">
    <section class="surface-panel panel">
      <p class="section-label">History</p>
      <h1>History Manager</h1>
      <div class="tabs">
        <button class="tab is-active" data-key="bilm-search-history">Search</button>
        <button class="tab" data-key="bilm-continue-watching">Continue</button>
        <button class="tab" data-key="bilm-favorites">Favorites</button>
        <button class="tab" data-key="bilm-watch-later">Watch Later</button>
      </div>
      <div class="actions"><button id="clearAll" type="button">Clear current list</button></div>
      <ul id="historyList" class="list"></ul>
    </section>
  </main>
  <script src="../../shared/navbar.js" defer></script>
  <script src="./script.js" defer></script>
</body>
</html>
