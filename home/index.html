<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bilm — Discover what to watch</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon.png" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/foundation.css" />
  <link rel="stylesheet" href="../shared/navbar.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="../shared/access.js"></script>
  <script src="../shared/theme.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">BILM</p>
      <h1>Find your next <span>movie night</span> in seconds.</h1>
      <p class="hero-copy">A cleaner homepage focused on discovery, quick actions, and your saved picks.</p>
      <form id="heroSearchForm" class="hero-search" action="../search/" method="get">
        <input id="heroSearchInput" name="q" type="search" placeholder="Search movies or TV shows..." autocomplete="off" />
        <button type="submit">Search</button>
      </form>
      <div class="quick-nav" aria-label="Quick links">
        <a href="../movies/">Movies</a>
        <a href="../tv/">TV Shows</a>
        <a href="../search/">Search</a>
        <a href="../settings/">Settings</a>
      </div>
    </section>

    <section class="dashboard-grid" id="statsGrid"></section>

    <section class="library" data-key="bilm-continue-watching">
      <div class="library-head">
        <h2>Continue Watching</h2>
        <div class="actions">
          <button type="button" class="toggle-edit">Edit</button>
          <button type="button" class="remove-selected" hidden disabled>Remove selected</button>
        </div>
      </div>
      <div class="filter-row">
        <button type="button" data-filter="all" class="is-active">All</button>
        <button type="button" data-filter="movie">Movies</button>
        <button type="button" data-filter="tv">TV</button>
      </div>
      <div class="library-row"></div>
    </section>

    <section class="library" data-key="bilm-favorites">
      <div class="library-head">
        <h2>Favorites</h2>
        <div class="actions">
          <button type="button" class="toggle-edit">Edit</button>
          <button type="button" class="remove-selected" hidden disabled>Remove selected</button>
        </div>
      </div>
      <div class="filter-row">
        <button type="button" data-filter="all" class="is-active">All</button>
        <button type="button" data-filter="movie">Movies</button>
        <button type="button" data-filter="tv">TV</button>
      </div>
      <div class="library-row"></div>
    </section>

    <section class="library" data-key="bilm-watch-later">
      <div class="library-head">
        <h2>Watch Later</h2>
        <div class="actions">
          <button type="button" class="toggle-edit">Edit</button>
          <button type="button" class="remove-selected" hidden disabled>Remove selected</button>
        </div>
      </div>
      <div class="filter-row">
        <button type="button" data-filter="all" class="is-active">All</button>
        <button type="button" data-filter="movie">Movies</button>
        <button type="button" data-filter="tv">TV</button>
      </div>
      <div class="library-row"></div>
    </section>
  </main>

  <script src="../shared/foundation.js"></script>
  <script src="../shared/navbar.js" defer></script>
  <script src="./script.js" defer></script>
</body>
</html>
